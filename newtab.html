<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <style>
    :root {
      --bg-primary: #1a1b26;
      --bg-secondary: #24283b;
      --bg-tertiary: #292e42;
      --accent-primary: #7aa2f7;
      --accent-secondary: #bb9af7;
      --accent-tertiary: #7dcfff;
      --text-primary: #c0caf5;
      --text-secondary: #a9b1d6;
      --text-muted: #565f89;
      --border-color: #3b4261;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 48px;
      height: 48px;
      color: white;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .open-btn {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(122, 162, 247, 0.3);
    }

    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(122, 162, 247, 0.4);
    }

    .open-btn svg {
      width: 24px;
      height: 24px;
    }

    .hint {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <path d="M12 18v-6"/>
        <path d="M9 15l3-3 3 3"/>
      </svg>
    </div>

    <h1>PDF Annotator Pro</h1>
    <p class="subtitle">Open a PDF to start annotating</p>

    <button class="open-btn" id="open-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>
      Open PDF File
    </button>

    <p class="hint">Or drag and drop a PDF file anywhere on this page</p>

    <input type="file" id="file-input" accept=".pdf,application/pdf">
  </div>

  <script src="js/newtab.js"></script>
</body>
</html>
